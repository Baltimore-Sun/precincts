air ? (intensity > 0.5 ? '#fff' : '#222') : '#222';\n            var pct = totalVotes > 0 ? (e.votes / totalVotes * 100).toFixed(1) + '%' : '—';\n            var marginCell = '';\n            if (inPair && leader === e.name) {\n              var other = pair[0] === e.name ? pair[1] : pair[0];\n              var diff = e.votes - (prec.votes[other] || 0);\n              marginCell = '+' + diff.toLocaleString();\n            }\n            return \"<tr style='background:\" + bg + \";'>\" +\n              \"<td style='padding:3px 10px 3px 0; white-space:nowrap; font-family:\\\"Noto Sans\\\",Helvetica,sans-serif; font-size:13px; color:\" + textColor + \";'>\" + e.name + '<\/td>' +\n              \"<td style='padding:3px 6px; text-align:right; font-variant-numeric:tabular-nums; font-family:\\\"Noto Sans\\\",Helvetica,sans-serif; font-size:13px; color:\" + textColor + \";'>\" + e.votes.toLocaleString() + '<\/td>' +\n              \"<td style='padding:3px 6px; text-align:right; font-variant-numeric:tabular-nums; font-family:\\\"Noto Sans\\\",Helvetica,sans-serif; font-size:13px; color:\" + textColor + \";'>\" + pct + '<\/td>' +\n              \"<td style='padding:3px 0 3px 8px; text-align:right; font-variant-numeric:tabular-nums; font-family:\\\"Noto Sans\\\",Helvetica,sans-serif; font-size:13px; font-weight:500; color:\" + textColor + \";'>\" + marginCell + '<\/td><\/tr>';\n          }).join('');\n\n          var hiddenNote = nTotal > 5 ? \" <i>(5 of \" + nTotal + ' candidates shown)<\/i>' : '';\n          var footer = \"<div style='margin-top:6px; padding-top:6px; border-top:1px solid #dddcda; color:#555; font-family:\\\"Noto Sans\\\",Helvetica,sans-serif; font-size:12px;'>Total votes: \" + totalVotes.toLocaleString() + hiddenNote + '<\/div>';\n\n          return \"<div style='min-width:230px; max-width:300px;'>\" +\n            \"<div style='font-family:\\\"Noto Sans\\\",Helvetica,sans-serif; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.06em; color:#1c2551; padding:6px 10px 8px 0; border-bottom:1px solid rgba(20,25,45,0.08);'>\" + precinctName + '<\/div>' +\n            \"<div style='padding:0 2px;'><table style='border-collapse:collapse; width:100%;'>\" + rows + '<\/table>' + footer + '<\/div><\/div>';\n        }\n\n        function setPolygonsToMarginFill() {\n          polygonLayers.forEach(function(layer) {\n            layer.setStyle({ fillColor: MUTED_FILL, fillOpacity: 0.5, color: '#ffffff', weight: 0.8 });\n          });\n        }\n        function restorePolygonsToWinnerFill() {\n          polygonLayers.forEach(function(layer) {\n            layer.setStyle({ fillColor: layer._winnerFillColor, fillOpacity: 0.85, color: '#ffffff', weight: 0.8 });\n          });\n        }\n\n        function updatePolygonContentForMargin(pair) {\n          polygonLayers.forEach(function(layer) {\n            var content = buildMarginPopupHtml(layer._precinctName, pair);\n            if (layer.setPopupContent) layer.setPopupContent(content);\n            if (layer.setTooltipContent) layer.setTooltipContent(content);\n            layer._fullTooltipContent = content;\n          });\n        }\n        function restorePolygonContentForWinner() {\n          polygonLayers.forEach(function(layer) {\n            if (layer._winnerPopupContent !== undefined && layer.setPopupContent) {\n              layer.setPopupContent(layer._winnerPopupContent);\n            }\n            if (layer._winnerTooltipContent !== undefined && layer.setTooltipContent) {\n              layer.setTooltipContent(layer._winnerTooltipContent);\n            }\n            layer._fullTooltipContent = layer._winnerTooltipContent;\n          });\n        }\n\n        // Top-right chip content for the margin view: nested proportional\n        // circles with a votes-margin ladder. No title, no tie entry — those\n        // were dropped in the minimalist legend pass.\n        function renderCircleScale(pair, maxMargin) {\n          var scaleEl = document.getElementById('scaleBoxContent');\n          if (!scaleEl) return;\n          var sizes = niceScale3(maxMargin);\n          var radii = sizes.map(function(v) {\n            return Math.max(MIN_CIRCLE_RADIUS, MAX_CIRCLE_RADIUS * Math.sqrt(v / sizes[2]));\n          });\n          var maxR = radii[2];\n          var drawH = maxR*2+4;\n          var svg = \"<svg width='\" + (maxR*2+4) + \"' height='\" + drawH + \"' style='overflow:visible;'>\";\n          for (var i = 2; i >= 0; i--) {\n            svg += \"<circle cx='\" + (maxR+2) + \"' cy='\" + (drawH-2-radii[i]) + \"' r='\" + radii[i] + \"' fill='none' stroke='#8b8a86' stroke-width='1.5'><\/circle>\";\n          }\n          svg += '<\/svg>';\n          var labels = \"<div style='display:flex; flex-direction:column; justify-content:space-between; height:\" + drawH + \"px; margin-left:5px;'>\";\n          for (var j = 2; j >= 0; j--) {\n            labels += \"<span style='font-size:9px; color:#8b8a86; line-height:1;'>\" + sizes[j].toLocaleString() + '<\/span>';\n          }\n          labels += '<\/div>';\n\n          scaleEl.innerHTML = \"<div style='display:flex; align-items:flex-end;'><div>\" + svg + '<\/div>' + labels + '<\/div>';\n        }\n\n        function grayForIntensity(t) {\n          var v = Math.round(232 - t * (232 - 60));\n          return 'rgb(' + v + ',' + v + ',' + v + ')';\n        }\n\n        // Top-right chip content for the winner view: single grayscale share\n        // ramp with end labels reflecting THIS race's actual dynamic\n        // floor/ceiling (not a fixed 30%-100% assumption). No title.\n        function renderWinnerScale() {\n          var scaleEl = document.getElementById('scaleBoxContent');\n          if (!scaleEl) return;\n          var barH = 16;\n          var stopCount = 12;\n          var gradientStops = [];\n          for (var i = 0; i <= stopCount; i++) {\n            var t = i / stopCount;\n            gradientStops.push(grayForIntensity(t) + ' ' + Math.round(t * 100) + '%');\n          }\n          var bar = \"<div style='width:120px; height:\" + barH + \"px; border-radius:3px; background:linear-gradient(to right, \" + gradientStops.join(', ') + \");'><\/div>\";\n\n          var floorLabel = (INTENSITY_FLOOR * 100).toFixed(1) + '%';\n          var ceilingLabel = (INTENSITY_CEILING * 100).toFixed(1) + '%';\n\n          var html = bar;\n          html += \"<div style='display:flex; justify-content:space-between; margin-top:2px;'>\" +\n            \"<span style='font-size:9px; color:#8b8a86;'>\" + floorLabel + \"<\/span>\" +\n            \"<span style='font-size:9px; color:#8b8a86;'>\" + ceilingLabel + \"<\/span><\/div>\";\n          scaleEl.innerHTML = html;\n        }\n\n        function renderCircles(pair) {\n          marginLayerGroup.clearLayers();\n          if (pair.length !== 2) return;\n\n          var margins = [];\n          Object.keys(electionData.precincts).forEach(function(name) {\n            var prec = electionData.precincts[name];\n            var vA = prec.votes[pair[0]] || 0;\n            var vB = prec.votes[pair[1]] || 0;\n            margins.push(Math.abs(vA - vB));\n          });\n          var maxMargin = Math.max.apply(null, margins.concat([1]));\n\n          Object.keys(electionData.precincts).forEach(function(name) {\n            var prec = electionData.precincts[name];\n            var vA = prec.votes[pair[0]] || 0;\n            var vB = prec.votes[pair[1]] || 0;\n            var margin = Math.abs(vA - vB);\n            var totalAll = Object.keys(prec.votes).reduce(function(s,k){ return s + prec.votes[k]; }, 0);\n\n            var marker;\n            if (margin === 0) {\n              marker = L.marker([prec.lat, prec.lng], {\n                icon: L.divIcon({\n                  className: '',\n                  html: tieMarkerHtml(TIE_COLOR, candColor(pair[0]), candColor(pair[1])),\n                  iconSize: [26, 26],\n                  iconAnchor: [13, 8]\n                }),\n                pane: 'circlePane',\n                interactive: false\n              });\n            } else {\n              var leaderName = vA > vB ? pair[0] : pair[1];\n              var leaderVotes = Math.max(vA, vB);\n              var share = totalAll > 0 ? leaderVotes / totalAll : 0;\n              var intensity = scaleIntensity(share);\n              var color = blendColorByIntensity(candColor(leaderName), intensity);\n              var r = Math.max(MIN_CIRCLE_RADIUS, MAX_CIRCLE_RADIUS * Math.sqrt(margin / maxMargin));\n              marker = L.circleMarker([prec.lat, prec.lng], {\n                radius: r, fillColor: color, color: '#fff', weight: 1,\n                fillOpacity: 0.9, interactive: false, pane: 'circlePane', renderer: circleRenderer\n              });\n            }\n            marginLayerGroup.addLayer(marker);\n          });\n\n          renderCircleScale(pair, maxMargin);\n        }\n\n        // Shared pill chrome so both panels share row height/structure. The\n        // winner pills carry a transparent border (they read as plain labels);\n        // the margin pills get a visible border + selectable states.\n        var PILL_BASE = 'border-radius:999px; padding:3px 9px 3px 5px; display:inline-flex; align-items:center; gap:5px; font-size:12px; white-space:nowrap; font-family:\\\"Noto Sans\\\",Helvetica,sans-serif;';\n        function dotSpan(color) {\n          return \"<span style='display:inline-block; width:10px; height:10px; border-radius:50%; background:\" + color + \"; flex-shrink:0;'><\/span>\";\n        }\n        // Reserved width for the lock-icon slot, always rendered (empty or\n        // filled) so a pill's footprint never changes with lock state, and\n        // Precinct Wins pills (which never show a lock) still match the\n        // Vote Margins pills' width for a consistent side-by-side layout.\n        var LOCK_SLOT_WIDTH = 13;\n        function lockSlot(iconHtml) {\n          return \"<span style='display:inline-flex; width:\" + LOCK_SLOT_WIDTH + \"px; flex-shrink:0;'>\" + (iconHtml || '') + '<\/span>';\n        }\n\n        // Precinct-wins pills: static, non-interactive, invisible border.\n        function renderWinnerPanel() {\n          var el = document.getElementById('panelWinner');\n          if (!el) return;\n          var html = '';\n          electionData.candidates.forEach(function(c) {\n            var check = c.name === electionData.contestWinner ? svgCheck : '';\n            html += \"<span style='\" + PILL_BASE + \" border:1px solid transparent;'>\" +\n              dotSpan(c.color) +\n              \"<span style='color:#222;'>\" + c.name + check + '<\/span>' + lockSlot('') + '<\/span>';\n          });\n          el.innerHTML = html;\n        }\n\n        // Vote-margins pills: tag-style ovals with selected / not-selected\n        // states. Selected = light-gray fill + navy border; the lock toggle\n        // rides inside the pill at its right edge, in a reserved slot that's\n        // always present so selecting/locking never shifts pill widths.\n        function renderMarginPanel() {\n          var el = document.getElementById('panelMargin');\n          if (!el) return;\n          var twoCandMode = electionData.marginCandidates.length === 2;\n          var html = '';\n          electionData.marginCandidates.forEach(function(c) {\n            var check = c.name === electionData.contestWinner ? svgCheck : '';\n\n            if (twoCandMode) {\n              html += \"<span style='\" + PILL_BASE + \" border:1px solid transparent;'>\" +\n                dotSpan(c.color) +\n                \"<span style='color:#222;'>\" + c.name + check + '<\/span>' + lockSlot('') + '<\/span>';\n              return;\n            }\n\n            var isSel = selectedPair.indexOf(c.name) !== -1;\n            var isLocked = locked === c.name;\n            var showLock = isSel && (isLocked || !locked);\n            var lockHtml = showLock\n              ? \"<span class='lockToggle' data-name='\" + c.name + \"'>\" + lockIconSvg(isLocked) + '<\/span>'\n              : '';\n            var borderCol = isSel ? '#1c2551' : '#d3d1c7';\n            var bgCol = isSel ? '#e4e2db' : '#ffffff';\n            html += \"<span class='candRow' data-name='\" + c.name + \"' style='\" + PILL_BASE + \" cursor:pointer; border:1px solid \" + borderCol + \"; background:\" + bgCol + \";'>\" +\n              dotSpan(c.color) +\n              \"<span style='color:#222;'>\" + c.name + check + '<\/span>' + lockSlot(lockHtml) + '<\/span>';\n          });\n          el.innerHTML = html;\n\n          if (twoCandMode) return;  // nothing interactive to wire up\n\n          el.querySelectorAll('.candRow').forEach(function(row) {\n            row.addEventListener('click', function() {\n              var name = row.getAttribute('data-name');\n              if (selectedPair.indexOf(name) !== -1) {\n                if (selectedPair.length > 1) {\n                  selectedPair = selectedPair.filter(function(n) { return n !== name; });\n                  if (locked === name) locked = null;\n                }\n              } else {\n                if (selectedPair.length >= 2) {\n                  var swapOut = locked ? selectedPair.find(function(n) { return n !== locked; }) : selectedPair[0];\n                  selectedPair = selectedPair.filter(function(n) { return n !== swapOut; });\n                }\n                selectedPair.push(name);\n              }\n              renderMarginPanel();\n              if (currentView === 'margin') {\n                renderCircles(selectedPair);\n                updatePolygonContentForMargin(selectedPair);\n              }\n            });\n          });\n          el.querySelectorAll('.lockToggle').forEach(function(icon) {\n            icon.addEventListener('click', function(e) {\n              e.stopPropagation();\n              var name = icon.getAttribute('data-name');\n              locked = (locked === name) ? null : name;\n              renderMarginPanel();\n            });\n          });\n        }\n\n        // Bottom-center overlay: an italic descriptor cue floating above a\n        // translucent box holding the two tabs and the candidate-pill panels.\n        // Built in JS (not an addControl) because Leaflet's corner control\n        // positions can't express bottom-center. pointer-events are off on the\n        // wrapper/cue so map pan/zoom passes through, on for the box itself.\n        function buildToggleOverlay() {\n          var wrap = document.createElement('div');\n          wrap.style.cssText = 'position:absolute; left:50%; bottom:16px; transform:translateX(-50%); width:calc(100% - 32px); max-width:475px; z-index:1000; pointer-events:none; font-family:\\\"Noto Sans\\\",Helvetica,sans-serif;';\n\n          var cue = document.createElement('div');\n          cue.id = 'panelCue';\n          cue.style.cssText = 'position:relative; z-index:1; text-align:center; font-style:italic; font-size:11px; color:#333333; margin-bottom:6px; text-shadow:0 1px 2px rgba(255,255,255,0.85); pointer-events:none; transition:opacity 0.15s;';\n          cue.textContent = 'Who led each precinct';\n\n          var box = document.createElement('div');\n          box.style.cssText = 'position:relative; z-index:2; pointer-events:auto; background:rgba(255,255,255,0.85); backdrop-filter:blur(6px); border:0.5px solid rgba(20,25,45,0.10); border-radius:12px; padding:9px 11px;';\n          box.innerHTML =\n            \"<div style='display:flex; gap:14px; margin-bottom:7px;'>\" +\n              \"<button id='tabWinner' style='border:none; background:none; padding:0; margin:0; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.05em; cursor:pointer; font-family:inherit; color:#1c2551;'>Precinct wins<\/button>\" +\n              \"<button id='tabMargin' style='border:none; background:none; padding:0; margin:0; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.05em; cursor:pointer; font-family:inherit; color:#8b8a86;'>Vote margins<\/button>\" +\n            \"<\/div>\" +\n            \"<div id='panelWinner' style='display:flex; flex-wrap:wrap; gap:5px;'><\/div>\" +\n            \"<div id='panelMargin' style='display:none; flex-wrap:wrap; gap:5px;'><\/div>\";\n\n          wrap.appendChild(cue);\n          wrap.appendChild(box);\n          el.appendChild(wrap);\n\n          document.getElementById('tabWinner').addEventListener('click', function() { switchView('winner'); });\n          document.getElementById('tabMargin').addEventListener('click', function() { switchView('margin'); });\n\n          // Whichever precinct's info window is open, the cue steps aside\n          // rather than risk sitting on top of it.\n          mapObj.on('popupopen', function() {\n            var c = document.getElementById('panelCue');\n            if (c) c.style.opacity = '0';\n          });\n          mapObj.on('popupclose', function() {\n            var c = document.getElementById('panelCue');\n            if (c) c.style.opacity = '1';\n          });\n        }\n\n        function switchView(view) {\n          mapObj.closePopup();\n          currentView = view;\n          var tabWinner = document.getElementById('tabWinner');\n          var tabMargin = document.getElementById('tabMargin');\n          var panelWinner = document.getElementById('panelWinner');\n          var panelMargin = document.getElementById('panelMargin');\n          var cue = document.getElementById('panelCue');\n\n          function applyTabStyle(tab, isActive) {\n            if (tab) tab.style.color = isActive ? '#1c2551' : '#8b8a86';\n          }\n\n          if (view === 'margin') {\n            applyTabStyle(tabMargin, true);\n            applyTabStyle(tabWinner, false);\n            panelMargin.style.display = 'flex'; panelWinner.style.display = 'none';\n            if (cue) cue.textContent = electionData.marginCueText;\n            setPolygonsToMarginFill();\n            updatePolygonContentForMargin(selectedPair);\n            renderCircles(selectedPair);\n            marginLayerGroup.addTo(mapObj);\n          } else {\n            applyTabStyle(tabWinner, true);\n            applyTabStyle(tabMargin, false);\n            panelWinner.style.display = 'flex'; panelMargin.style.display = 'none';\n            if (cue) cue.textContent = 'Who led each precinct';\n            restorePolygonsToWinnerFill();\n            restorePolygonContentForWinner();\n            marginLayerGroup.removeFrom(mapObj);\n            renderWinnerScale();\n          }\n        }\n\n        buildToggleOverlay();\n        renderWinnerPanel();\n        renderMarginPanel();\n        renderWinnerScale();\n\n        // ── Resolve polygon layers reliably ────────────────────────────────────\n        // R's leaflet::addPolygons does NOT attach layer.feature.properties the\n        // way native L.geoJSON does, so we cannot identify polygons that way.\n        // Resolve each precinct's polygon via a cascade of strategies, tag it\n        // with its name + captured winner styling/content, and collect them.\n        var polygonsByName = {};\n\n        // Strategy 1: R leaflet layer manager lookup by layerId (= precinct name)\n        if (mapObj.layerManager && typeof mapObj.layerManager.getLayer === 'function') {\n          Object.keys(electionData.precincts).forEach(function(name) {\n            var lyr = null;\n            try { lyr = mapObj.layerManager.getLayer('shape', name); } catch (err) {}\n            if (lyr) polygonsByName[name] = lyr;\n          });\n        }\n\n        // Strategy 2: read name from feature.properties or options.layerId\n        if (Object.keys(polygonsByName).length === 0) {\n          mapObj.eachLayer(function(layer) {\n            if (layer instanceof L.Polygon) {\n              var nm = null;\n              if (layer.feature && layer.feature.properties && layer.feature.properties.name) {\n                nm = layer.feature.properties.name;\n              } else if (layer.options && layer.options.layerId) {\n                nm = layer.options.layerId;\n              }\n              if (nm && electionData.precincts[nm]) polygonsByName[nm] = layer;\n            }\n          });\n        }\n\n        // Strategy 3 (last resort): match each polygon to the nearest precinct\n        // centroid. Only reached if the addressable strategies both fail.\n        if (Object.keys(polygonsByName).length === 0) {\n          var polys = [];\n          mapObj.eachLayer(function(layer) { if (layer instanceof L.Polygon) polys.push(layer); });\n          polys.forEach(function(layer) {\n            var c = layer.getBounds().getCenter();\n            var best = null, bestD = Infinity;\n            Object.keys(electionData.precincts).forEach(function(name) {\n              var p = electionData.precincts[name];\n              var d = Math.pow(p.lat - c.lat, 2) + Math.pow(p.lng - c.lng, 2);\n              if (d < bestD) { bestD = d; best = name; }\n            });\n            if (best && !polygonsByName[best]) polygonsByName[best] = layer;\n          });\n        }\n\n        // Tag each resolved polygon and capture its Precinct Winner styling +\n        // popup/tooltip content (independent of layer.feature, which is absent).\n        Object.keys(polygonsByName).forEach(function(name) {\n          var layer = polygonsByName[name];\n          layer._precinctName = name;\n          layer._nameOnlyContent = name;\n          layer._winnerFillColor = (layer.options && layer.options.fillColor) ? layer.options.fillColor : '#CCCCCC';\n          if (layer.getPopup && layer.getPopup()) {\n            layer._winnerPopupContent = layer.getPopup().getContent();\n          }\n          if (layer.getTooltip && layer.getTooltip()) {\n            layer._winnerTooltipContent = layer.getTooltip().getContent();\n            layer._fullTooltipContent = layer._winnerTooltipContent;\n          }\n          polygonLayers.push(layer);\n        });\n\n        if (polygonLayers.length === 0) {\n          console.warn('[map] Could not resolve precinct polygons — margin view fill/popups will not update.');\n        }\n\n        // Tooltips are meant purely as a hover preview (see the addPolygons\n        // comment in R: hover shows the full info window, tap/click promotes\n        // it to a sticky popup). Touch devices have no real hover state — a\n        // tap fires a simulated mouseover THEN a click, so without this both\n        // the tooltip and the popup would appear at once. Detect no-hover\n        // capability and unbind every tooltip there entirely; the popup\n        // (opened via tap) becomes the only info window on those devices.\n        var supportsHover = !!(window.matchMedia && window.matchMedia('(hover: hover)').matches);\n        if (!supportsHover) {\n          polygonLayers.forEach(function(layer) {\n            if (layer.unbindTooltip) layer.unbindTooltip();\n          });\n        }\n\n        // Only one info window visible at a time: once a precinct is clicked\n        // (popup pinned open), every other precinct's hover tooltip reverts\n        // to a plain name label. Closing the popup restores full-info hover\n        // tooltips everywhere. (On no-hover devices this is a no-op — there\n        // are no bound tooltips left to update.)\n        mapObj.on('popupopen', function(e) {\n          polygonLayers.forEach(function(layer) {\n            if (layer._nameOnlyContent && layer.setTooltipContent) {\n              layer.setTooltipContent(layer._nameOnlyContent);\n            }\n          });\n          if (e.popup && e.popup._source && e.popup._source.closeTooltip) {\n            e.popup._source.closeTooltip();\n          }\n        });\n        mapObj.on('popupclose', function(e) {\n          polygonLayers.forEach(function(layer) {\n            if (layer._fullTooltipContent && layer.setTooltipContent) {\n              layer.setTooltipContent(layer._fullTooltipContent);\n            }\n          });\n        });\n      }\n    ).call(this.getMap(), el, x, data);\n}","data":null}]}}</script>
